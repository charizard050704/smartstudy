{% extends "base.html" %}
{% block content %}

<h1>🌳 Tree Collection</h1>

{% for tier, trees in collection.items %}

<div class="card">

<h2 style="text-transform:capitalize;">
    {{ tier }} Trees
</h2>

<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">

{% for tree in trees %}

<div style="
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
    text-align:center;
    background:{% if tree.owned %}#e8f5e9{% else %}#eeeeee{% endif %};
">

{% if tree.owned %}
🌳 {{ tree.name }}
{% else %}
❓ Unknown
{% endif %}

</div>

{% endfor %}

</div>

</div>

{% endfor %}

{% endblock %}
