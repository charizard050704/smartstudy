{% extends "base.html" %}
{% block content %}

<h2>🏆 Leaderboard</h2>

<div class="card" style="padding:15px; margin-bottom:20px;">
    <div style="display:flex; gap:10px; flex-wrap:wrap;">

    <select id="metricSelect" style="
        padding:8px 12px;
        border-radius:8px;
        border:1px solid #ccc;
    ">
        <option value="study_time">Study Time</option>
        <option value="points">Points</option>
        <option value="current_streak">Current Streak</option>
        <option value="longest_streak">Longest Streak</option>
    </select>

    <select id="modeSelect" style="
        padding:8px 12px;
        border-radius:8px;
        border:1px solid #ccc;
    ">
        <option value="all_time">All Time</option>
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
    </select>

</div>

</div>

<div id="leaderboardContainer"></div>

<script>

const metricSelect = document.getElementById("metricSelect");
const modeSelect = document.getElementById("modeSelect");

function updateModeVisibility() {
    const metric = metricSelect.value;

    if (metric === "current_streak" || metric === "longest_streak") {
        modeSelect.style.display = "none";
    } else {
        modeSelect.style.display = "inline-block";
    }
}

function loadLeaderboard() {

    const metric = metricSelect.value;
    const mode = modeSelect.value;

    let url = `/leaderboard/api/?metric=${metric}`;

    if (!(metric === "current_streak" || metric === "longest_streak")) {
        url += `&mode=${mode}`;
    }

    document.getElementById("leaderboardContainer").innerHTML = "Loading...";

    fetch(url)
        .then(res => res.json())
        .then(data => {

            let html = `
                <div class="card" style="padding:15px; margin-bottom:20px;">
                    <h3 style="margin-bottom:15px;">🏆 Top 10</h3>
                    <div>
            `;

            data.top_10.forEach((entry, index) => {

                let highlight = entry.username === data.current_user 
                    ? "border:2px solid #198754; background:#e8f5e9;" 
                    : "background:#f8f9fa;";

                let medal = "";
                if (index === 0) medal = "🥇";
                else if (index === 1) medal = "🥈";
                else if (index === 2) medal = "🥉";

                html += `
                    <div style="
                        padding:12px;
                        margin-bottom:8px;
                        border-radius:10px;
                        display:flex;
                        justify-content:space-between;
                        align-items:center;
                        ${highlight}
                    ">
                        <div>
                            ${medal} <strong>#${index+1}</strong> — ${entry.username}
                        </div>
                        <div style="font-weight:bold;">
                            ${entry.value}
                        </div>
                    </div>
                `;
            });

            html += `</div></div>`;

            html += `
                <div class="card" style="padding:15px;">
                    <h4>Your Rank: ${data.your_rank}</h4>
                    <p>Your Score: <strong>${data.your_data.value}</strong></p>
                </div>
            `;

            document.getElementById("leaderboardContainer").innerHTML = html;
        })
        .catch(() => {
            document.getElementById("leaderboardContainer").innerHTML = "❌ Failed to load leaderboard";
        });
}

metricSelect.addEventListener("change", () => {
    updateModeVisibility();
    loadLeaderboard();
});

modeSelect.addEventListener("change", loadLeaderboard);

updateModeVisibility();
loadLeaderboard();

</script>

{% endblock %}
