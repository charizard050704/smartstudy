{% extends "base.html" %}
{% block content %}

<h1>🌳 Your Forest</h1>

<div style="
    width: 100%;
    max-width: 800px;
    margin: auto;
    background: #e8f5e9;
    padding: 20px;
    border-radius: 12px;
">


<div id="forestGrid" style="
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
">
</div>


</div>

<script>
const TREE_DATA = {{ tree_json|safe }};

const spriteMap = {
    "oak": "/static/planner/sprites/tree_oak.png",
    "maple": "/static/planner/sprites/tree_small.png",
    "neem": "/static/planner/sprites/tree_simple.png",
    "pine": "/static/planner/sprites/tree_pine.png",

    "jacaranda": "/static/planner/sprites/tree_simple.png",
    "silver_birch": "/static/planner/sprites/tree_thin.png",

    "redwood": "/static/planner/sprites/tree_simple.png",
    "baobab": "/static/planner/sprites/tree_palm.png",
    "dragon_tree": "/static/planner/sprites/tree_cone.png",

    "giant_sequoia": "/static/planner/sprites/tree_simple.png",
    "methuselah_pine": "/static/planner/sprites/tree_pine.png",

    "yggdrasil": "/static/planner/sprites/tree_palm.png",
    "kalpavriksha": "/static/planner/sprites/tree_oak.png",
    "world_tree": "/static/planner/sprites/tree_simple.png"
};

const grid = document.getElementById("forestGrid");

const TOTAL_TILES = 30;

for (let i = 0; i < TOTAL_TILES; i++) {

    const tile = document.createElement("div");

    tile.style.height = "100px";
    tile.style.background = "#c8e6c9";
    tile.style.borderRadius = "10px";
    tile.style.display = "flex";
    tile.style.alignItems = "center";
    tile.style.justifyContent = "center";
    tile.style.cursor = "pointer";

    const tree = TREE_DATA[i];

    if (tree) {

        const img = document.createElement("img");

        img.src = spriteMap[tree.species] || "/static/planner/sprites/tree_small.png";

        // 🔥 small size fix
        img.style.width = (25 + tree.growth * 8) + "px";

        img.onclick = () => {
            showTreeInfo(
                tree.tier || "Unknown",
                tree.species,
                tree.date || "-",
                tree.subject || "-",
                tree.protected || false,
                tree.growth
            );
        };

        tile.appendChild(img);

    } else {
        tile.innerHTML = "<span style='color:#777;font-size:12px;'></span>";
    }

    grid.appendChild(tile);
}
</script>

<!-- POPUP -->

<div id="treeInfoPopup" style="
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    z-index:20000;
    width:300px;
">
    <h3>🌳 Tree Details</h3>
    <p id="treeInfoContent"></p>
    <button class="btn btn-primary" onclick="closeTreeInfo()">Close</button>
</div>

<script>
function showTreeInfo(status, species, date, subject, protectedStatus, growth) {

    let content = `
        <strong>Tier:</strong> ${status}<br>
        <strong>Species:</strong> ${species}<br>
        <strong>Planted:</strong> ${date}<br>
        <strong>Subject:</strong> ${subject}<br>
        <strong>Growth:</strong> ${growth}<br>
        <strong>Protected:</strong> ${protectedStatus}
    `;

    document.getElementById("treeInfoContent").innerHTML = content;
    document.getElementById("treeInfoPopup").style.display = "block";
}

function closeTreeInfo() {
    document.getElementById("treeInfoPopup").style.display = "none";
}
</script>

{% endblock %}
